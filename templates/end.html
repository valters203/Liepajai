{% extends "base.html" %}

{% block content %}
<div class="content-wrapper">
    <h1>🎉 Paldies ka spēlējāt!</h1>
    <p style="text-align: center; font-size: 1.1em; color: #666;">Jūsu Liepājas ekskursija ir galā!</p>
    
    <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px; border-radius: 15px; text-align: center; margin: 30px 0; color: white;">
        <p style="font-size: 0.9em; margin: 0 0 10px 0; opacity: 0.95;">Jūsu kopējie punkti</p>
        <h2 style="font-size: 3em; margin: 0; color: white;">{{ score }}</h2>
    </div>
    
    <p style="text-align: center; color: #888; margin: 20px 0;">
        💡 Jūs varat savus rezultātus vēlāk apskatīties rezultātu logā
    </p>
    
    <div class="ui">
        <a href="{{ url_for('restart') }}" class="btn" style="min-width: 200px;">🔄 Spēlēt vēlreiz</a>
        <a href="{{ url_for('title') }}" class="btn btn-secondary" style="min-width: 200px;">← Galvenā Izvēlne</a>
    </div>
</div>
{% endblock %}
