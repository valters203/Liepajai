{% extends "base.html" %}

{% block content %}
<div class="content-wrapper">
    <h1>📊 Rezultāti</h1>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0;">
        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; border-radius: 15px; text-align: center; color: white; box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);">
            <p style="margin: 0 0 10px 0; opacity: 0.9; font-size: 0.95em;">Jūsu punkti</p>
            <h2 style="margin: 0; font-size: 2.5em; color: white;">{{ score }}</h2>
        </div>
        <div style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); padding: 30px; border-radius: 15px; text-align: center; color: white; box-shadow: 0 5px 20px rgba(245, 87, 108, 0.3);">
            <p style="margin: 0 0 10px 0; opacity: 0.9; font-size: 0.95em;">Pēdējie rezultāti</p>
            <h2 style="margin: 0; font-size: 2.5em; color: white;">{{ last }}</h2>
        </div>
    </div>
    
    <div class="ui">
        <a href="{{ url_for('title') }}" class="btn">← Atpakaļ uz galveno</a>
    </div>
</div>
{% endblock %}
